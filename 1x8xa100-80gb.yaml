apiVersion: v1
kind: Pod
metadata:
  name: 1x8xa100-80gb
  labels:
    num_nodes: "1"
    num_gpus: "8"
spec:
  nodeSelector:
    eks.amazonaws.com/nodegroup: trainer
    node.kubernetes.io/instance-type: p4de.24xlarge
  containers:
  - name: interactive
    # image: nvcr.io/nvidia/pytorch:25.06-py3
    image: public.ecr.aws/deep-learning-containers/pytorch-training:2.8.0-gpu-py312-cu129-ubuntu22.04-ec2-v1.33
    # https://catalog.ngc.nvidia.com/orgs/nvidia/containers/pytorch
    # https://docs.nvidia.com/deeplearning/frameworks/pytorch-release-notes/rel-25-06.html
    # https://docs.nvidia.com/deploy/cuda-compatibility/minor-version-compatibility.html
    command: ["/bin/bash", "-lc"]
    args: ["sleep infinity"]
    env:
    - name: NCCL_NET_PLUGIN
      value: ofi
    resources:
      requests:
        memory: "1Ti"
        cpu: "90"
        nvidia.com/gpu: "8"
        vpc.amazonaws.com/efa: "4"
      limits:
        memory: "1Ti"
        cpu: "90"
        nvidia.com/gpu: "8"
        vpc.amazonaws.com/efa: "4"
    volumeMounts:
    - name: fsx-storage
      mountPath: /fsx
    - name: efs-storage
      mountPath: /efs
    - name: dshm
      mountPath: /dev/shm

  volumes:
  - name: fsx-storage
    persistentVolumeClaim:
      claimName: fsx
  - name: efs-storage
    persistentVolumeClaim:
      claimName: efs
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 256Gi

