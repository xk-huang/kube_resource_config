apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: ray-3x8xa100
spec:
  rayVersion: "2.30.0"
  enableInTreeAutoscaling: false

  headGroupSpec:
    rayStartParams:
      dashboard-host: "0.0.0.0"
      num-gpus: "8"
    template:
      metadata:
        labels:
          app: ray-3x8xa100
          ray-node-type: head
          num_nodes: "3"
          num_gpus: "8"
      spec:
        terminationGracePeriodSeconds: 10
        nodeSelector:
          eks.amazonaws.com/nodegroup: trainer
          node.kubernetes.io/instance-type: p4de.24xlarge
        containers:
          - name: ray-head
            image: nvcr.io/nvidia/pytorch:25.06-py3
            command: ["/bin/bash", "-lc"]
            args:
              - |
                python -m pip install -U "ray[default]==2.30.0"
                exec ray start --head \
                  --node-ip-address="${MY_POD_IP}" \
                  --dashboard-host=0.0.0.0 \
                  --port=6379 \
                  --ray-client-server-port=10001 \
                  --num-cpus=90 \
                  --num-gpus=8 \
                  --block
            env:
              - name: MY_POD_IP
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
            ports:
              - containerPort: 6379
                name: gcs
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client
              - containerPort: 8000
                name: serve
            resources:
              requests:
                memory: "1Ti"
                cpu: "90"
                nvidia.com/gpu: "8"
              limits:
                memory: "1Ti"
                cpu: "90"
                nvidia.com/gpu: "8"
            volumeMounts:
              - name: fsx-storage
                mountPath: /fsx
              - name: efs-storage
                mountPath: /efs
              - name: dshm
                mountPath: /dev/shm
        volumes:
          - name: fsx-storage
            persistentVolumeClaim:
              claimName: fsx
          - name: efs-storage
            persistentVolumeClaim:
              claimName: efs
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 256Gi

  workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 2
      minReplicas: 2
      maxReplicas: 2
      rayStartParams:
        num-gpus: "8"
      template:
        metadata:
          labels:
            app: ray-3x8xa100
            ray-node-type: worker
            num_nodes: "3"
            num_gpus: "8"
        spec:
          terminationGracePeriodSeconds: 10
          nodeSelector:
            eks.amazonaws.com/nodegroup: trainer
            node.kubernetes.io/instance-type: p4de.24xlarge
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: ray-3x8xa100
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: ray-worker
              image: nvcr.io/nvidia/pytorch:25.06-py3
              command: ["/bin/bash", "-lc"]
              args:
                - |
                  python -m pip install -U "ray[default]==2.30.0"
                  exec ray start \
                    --address="${RAY_HEAD_SERVICE_HOST}:6379" \
                    --num-cpus=90 \
                    --num-gpus=8 \
                    --block
              resources:
                requests:
                  memory: "1Ti"
                  cpu: "90"
                  nvidia.com/gpu: "8"
                limits:
                  memory: "1Ti"
                  cpu: "90"
                  nvidia.com/gpu: "8"
              volumeMounts:
                - name: fsx-storage
                  mountPath: /fsx
                - name: efs-storage
                  mountPath: /efs
                - name: dshm
                  mountPath: /dev/shm
          volumes:
            - name: fsx-storage
              persistentVolumeClaim:
                claimName: fsx
            - name: efs-storage
              persistentVolumeClaim:
                claimName: efs
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 256Gi
